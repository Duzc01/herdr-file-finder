# herdr-file-finder example configuration
# =============================================================================
#
# Copy this file to the plugin config dir as `config.toml`:
#
#   ~/.config/herdr/plugins/config/herdr-file-finder/config.toml
#
# (`herdr plugin config-dir herdr-file-finder` prints the directory.)
# The whole file is optional — with no config file the default open action
# (first entry below) is used. Format: a single-line TOML string; prefer
# SINGLE-quoted literal strings since templates contain double quotes.

# What to do with the selected file. A command template run via `bash -c`;
# placeholders are substituted before execution:
#
#   {uri}  — percent-encoded absolute path (for warp:// URIs)
#   {path} — raw absolute path         (quote it: "{path}")
#   {dir}  — containing directory of the selected file
#
# Default (same behavior you get with no config file): open in a NEW WARP TAB,
# routed by file type — Markdown → Warp's rendered viewer, code/text → Warp's
# built-in editor:
#open = 'open "warp://action/new_tab?path={uri}"'
#
# Warp's built-in editor directly (supports an optional &line=N jump):
#open = 'open "warp://action/open_file_editor?path={uri}"'
#
# VS Code / Cursor:
#open = 'code "{path}"'
#open = 'cursor "{path}"'
#
# macOS default app for the file type:
#open = 'open "{path}"'
#
# Just print the path (e.g. for debugging your template):
#open = 'printf "%s\n" "{path}"; read -r _'

# -----------------------------------------------------------------------------
# Per-extension open actions (optional)
# -----------------------------------------------------------------------------
# Override the open action for specific file extensions. The key is the
# lowercased extension WITHOUT the dot; its value is a command template using
# the same placeholders as `open`. The most specific match wins: an extension
# listed here beats the top-level `open`, which is the fallback for everything
# else. Extensions not listed fall through to `open`.
#
#[open_by_ext]
# HTML → default browser (macOS `open` routes .html to the default browser;
# use `open -a "Google Chrome" "{path}"` to force a specific one):
#html = 'open "{path}"'
#htm  = 'open "{path}"'
#
# PDFs / images → macOS default app:
#pdf = 'open "{path}"'
#png = 'open "{path}"'
#jpg = 'open "{path}"'
#
# Source files → VS Code:
#ts = 'code "{path}"'
#py = 'code "{path}"'
